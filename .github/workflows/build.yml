name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        type: choice
        options: [patch, minor, major]
        default: patch

jobs:
  # ── Version Bump ───────────────────────────────────────────────────────────
  version:
    name: Bump Version
    runs-on: ubuntu-latest
    # Skip CI-authored commits to prevent infinite loops
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: bump
        run: |
          # Get latest semver tag (default to v0.0.0 if none exist)
          LATEST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          LATEST_TAG="${LATEST_TAG:-v0.0.0}"
          LATEST_VERSION="${LATEST_TAG#v}"

          BUMP="${{ inputs.bump || 'patch' }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "### Version bump: $LATEST_TAG → v$NEW_VERSION ($BUMP)" >> "$GITHUB_STEP_SUMMARY"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  # ── Web Deploy (VPS) ─────────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web to VPS
    needs: version
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/vps_key
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: SSH into VPS and run deploy.sh
        run: |
          ssh -i ~/.ssh/vps_key -o ConnectTimeout=10 \
            root@${{ secrets.VPS_HOST }} \
            "cd /root/anchor-pos && bash deploy.sh"
