name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0
  workflow_dispatch:

jobs:
  release:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Cache Electron Binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Build and Package
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: pnpm run package:win:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_TARGET: electron

      - name: Create SSH Key File
        run: |
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" > vps_key
          chmod 600 vps_key
        shell: bash

      - name: Upload Windows Build to VPS
        env:
          HOST: ${{ secrets.VPS_HOST }}
          USER: root
          PORT: 22
        run: |
          # Use SCP directly from Git Bash (which is available on windows-latest)
          # Use -o StrictHostKeyChecking=no to avoid prompt
          scp -P $PORT -i vps_key -o StrictHostKeyChecking=no -o BatchMode=yes \
            dist-electron/*.exe dist-electron/latest.yml \
            ${USER}@${HOST}:/root/anchor-pos/downloads/
        shell: bash

      - name: Cleanup SSH Key
        if: always()
        run: rm -f vps_key
        shell: bash
