name: Build and Deploy

# Triggered when code lands on main (merge from dev) or manually.
# Flow: bump patch version → tag → build Electron → deploy web → deploy Electron → GitHub Release
# Capacitor/Android: still built locally via build-android.sh (needs Android SDK + keystore)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        type: choice
        options: [patch, minor, major]
        default: patch
      skip_electron:
        description: 'Skip Electron build (web deploy only)'
        type: boolean
        default: false

jobs:
  # ── Version Bump ───────────────────────────────────────────────────────────
  version:
    name: Bump Version
    runs-on: ubuntu-latest
    # Skip CI-authored commits to prevent infinite loops
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: bump
        run: |
          # Get latest semver tag (default to v0.0.0 if none exist)
          LATEST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          LATEST_TAG="${LATEST_TAG:-v0.0.0}"
          LATEST_VERSION="${LATEST_TAG#v}"

          BUMP="${{ inputs.bump || 'patch' }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "### Version bump: $LATEST_TAG → v$NEW_VERSION ($BUMP)" >> "$GITHUB_STEP_SUMMARY"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  # ── Electron (Windows) ──────────────────────────────────────────────────────
  build-electron:
    name: Build Electron (Windows)
    needs: version
    runs-on: windows-latest
    if: ${{ github.event_name == 'push' || !inputs.skip_electron }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Set version from CI
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "
          echo "Building version: $VERSION"

      - name: Create .env
        shell: bash
        env:
          PS_PUBLIC_KEY: ${{ secrets.POWERSYNC_PUBLIC_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET_HEADER }}
        run: |
          {
            echo "BUILD_TARGET=electron"
            echo "POWERSYNC_URL=https://powersync.anchorshop.cloud"
            echo "VITE_POWERSYNC_URL=https://powersync.anchorshop.cloud"
            echo "POWERSYNC_API_URL=https://anchorshop.cloud"
            printf 'APP_SECRET_HEADER=%s\n' "$APP_SECRET"
            printf 'POWERSYNC_PUBLIC_KEY=%s\n' "$PS_PUBLIC_KEY"
          } > .env

      - name: Build and package
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: pnpm run package:win:ci
        env:
          BUILD_TARGET: electron

      - name: Upload artifacts (CI)
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest.yml
          retention-days: 14

  # ── Deploy Electron artifacts to VPS + create GitHub Release ────────────────
  deploy-electron:
    name: Deploy Electron to VPS
    needs: [version, build-electron]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist-electron

      - name: Setup SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/vps_key
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Upload to VPS downloads/
        run: |
          scp -i ~/.ssh/vps_key \
            dist-electron/*.exe \
            dist-electron/*.blockmap \
            dist-electron/latest.yml \
            root@${{ secrets.VPS_HOST }}:/root/anchor-pos/downloads/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --generate-notes \
            dist-electron/*.exe \
            dist-electron/*.blockmap \
            dist-electron/latest.yml

  # ── Web Deploy (VPS) ─────────────────────────────────────────────────────────
  # Runs in parallel with the Electron build — no dependency between them.
  deploy-web:
    name: Deploy Web to VPS
    needs: version
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/vps_key
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: SSH into VPS and run deploy.sh
        run: |
          ssh -i ~/.ssh/vps_key -o ConnectTimeout=10 \
            root@${{ secrets.VPS_HOST }} \
            "cd /root/anchor-pos && bash deploy.sh"
