name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Electron App
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Cache Electron Binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Create Electron .env
        shell: bash
        run: |
          cat > .env << 'EOF'
          POWERSYNC_URL=https://powersync.anchorshop.cloud
          POWERSYNC_API_URL=https://anchorshop.cloud
          APP_SECRET_HEADER=auto-pos-secret-handshake-2026
          POWERSYNC_PUBLIC_KEY=${{ secrets.POWERSYNC_PUBLIC_KEY }}
          EOF

      - name: Build and Package
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: pnpm run package:win:ci
        env:
          BUILD_TARGET: electron

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist-electron/*.exe
            dist-electron/latest.yml
          retention-days: 7

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist-electron

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist-electron/*.exe,dist-electron/latest.yml"
          target: "/root/anchor-pos/downloads/"
          strip_components: 1

