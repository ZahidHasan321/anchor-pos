name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Cache Electron Binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Create Electron .env
        shell: bash
        run: |
          cat > .env << 'EOF'
          POWERSYNC_URL=https://powersync.anchorshop.cloud
          POWERSYNC_API_URL=https://anchorshop.cloud
          APP_SECRET_HEADER=auto-pos-secret-handshake-2026
          POWERSYNC_PUBLIC_KEY=${{ secrets.POWERSYNC_PUBLIC_KEY }}
          EOF

      - name: Build and Package
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: pnpm run package:win:ci
        env:
          BUILD_TARGET: electron

      - name: Upload to VPS
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "$VPS_SSH_KEY" > vps_key
          # On Windows runners, use icacls to restrict key permissions
          icacls vps_key /inheritance:r /grant:r "$USERNAME:R"
          scp -P 22 -i vps_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            dist-electron/*.exe dist-electron/latest.yml \
            root@${HOST}:/root/anchor-pos/downloads/
          rm -f vps_key

      - name: Upload artifact (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist-electron/*.exe
            dist-electron/latest.yml
          retention-days: 7
