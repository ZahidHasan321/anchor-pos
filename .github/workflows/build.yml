name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0
  workflow_dispatch:

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install PNPM
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Cache Electron Binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Fix Permissions (Linux)
        if: runner.os == 'Linux'
        run: find node_modules -name "app-builder" -type f -exec chmod +x {} +

      - name: Build and Package
        run: pnpm run build:electron && pnpm exec electron-builder --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_TARGET: electron

      - name: Upload Windows Build to VPS
        if: matrix.os == 'windows-latest'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "dist-electron/*.exe,dist-electron/latest.yml"
          target: "/root/auto-pos/downloads/"
          strip_components: 1
