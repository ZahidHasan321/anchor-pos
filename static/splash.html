<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            font-family: sans-serif;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }
        .logo {
            width: 80px;
            height: 80px;
            background-color: #4f46e5;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 40px;
            font-weight: 900;
            font-style: italic;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2);
            margin-bottom: 20px;
        }
        .title {
            font-size: 24px;
            font-weight: 800;
            color: #1f2937;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            font-style: italic;
        }
        .subtitle {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }
        .loader {
            margin-top: 30px;
            width: 150px;
            height: 4px;
            background: #f3f4f6;
            border-radius: 2px;
            overflow: hidden;
        }
        .loader-bar {
            width: 100%;
            height: 100%;
            background: #4f46e5;
            animation: loading 2s infinite ease-in-out;
            transform-origin: 0% 50%;
        }
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <div class="logo">A</div>
    <div class="title">Anchor POS</div>
    <div class="subtitle">Starting system...</div>
    <div class="loader">
        <div class="loader-bar"></div>
    </div>
</body>
</html>
