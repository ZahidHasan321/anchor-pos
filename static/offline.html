<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Auto POS - Offline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #09090b;
    color: #fafafa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-tap-highlight-color: transparent;
  }

  .container {
    text-align: center;
    max-width: 360px;
    width: 100%;
  }

  .icon-wrap {
    width: 80px;
    height: 80px;
    margin: 0 auto 24px;
    background: rgba(239, 68, 68, 0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-wrap svg {
    width: 36px;
    height: 36px;
    stroke: #ef4444;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .app-name {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }

  .message {
    font-size: 15px;
    color: #a1a1aa;
    line-height: 1.5;
    margin-bottom: 32px;
  }

  .retry-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #fafafa;
    color: #09090b;
    border: none;
    border-radius: 8px;
    padding: 12px 32px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    -webkit-appearance: none;
    width: 100%;
  }

  .retry-btn:active {
    opacity: 0.7;
  }

  .retry-btn svg {
    width: 18px;
    height: 18px;
    stroke: #09090b;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .retry-btn.loading svg {
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .hint {
    margin-top: 20px;
    font-size: 12px;
    color: #52525b;
    line-height: 1.5;
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ef4444;
    margin-right: 6px;
    vertical-align: middle;
  }

  .status-dot.trying {
    background: #f59e0b;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-bar {
    margin-bottom: 32px;
    font-size: 13px;
    color: #71717a;
  }
</style>
</head>
<body>
<div class="container">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24">
      <line x1="1" y1="1" x2="23" y2="23"></line>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
      <line x1="12" y1="20" x2="12.01" y2="20"></line>
    </svg>
  </div>

  <div class="app-name">Auto POS</div>

  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">No internet connection</span>
  </div>

  <p class="message" id="messageText">
    Unable to reach the server. Retrying automatically...
  </p>

  <button class="retry-btn" id="retryBtn" onclick="retryConnection()">
    <svg viewBox="0 0 24 24">
      <polyline points="23 4 23 10 17 10"></polyline>
      <polyline points="1 20 1 14 7 14"></polyline>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
    </svg>
    Retry Now
  </button>

  <p class="hint" id="hintText">
    Auto-retrying in <span id="countdown">3</span>s...
  </p>
</div>

<script>
  var SERVER_URL = 'https://anchorshop.cloud';
  var retryDelay = 3;        // seconds before first auto-retry
  var maxRetryDelay = 30;    // cap
  var countdownTimer = null;
  var currentCountdown = retryDelay;

  function setRetrying() {
    var dot = document.getElementById('statusDot');
    var text = document.getElementById('statusText');
    var btn = document.getElementById('retryBtn');
    dot.className = 'status-dot trying';
    text.textContent = 'Trying to reconnect...';
    btn.classList.add('loading');
    btn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg> Connecting...';
  }

  function retryConnection() {
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
    setRetrying();
    // Small delay so the user sees the "Connecting..." state
    setTimeout(function() {
      window.location.href = SERVER_URL;
    }, 400);
  }

  // Auto-retry: ping the server and redirect when reachable
  function startAutoRetry() {
    currentCountdown = retryDelay;
    document.getElementById('countdown').textContent = currentCountdown;
    document.getElementById('hintText').style.display = '';

    countdownTimer = setInterval(function() {
      currentCountdown--;
      if (currentCountdown <= 0) {
        clearInterval(countdownTimer);
        countdownTimer = null;
        tryReach();
      } else {
        document.getElementById('countdown').textContent = currentCountdown;
      }
    }, 1000);
  }

  function tryReach() {
    setRetrying();
    // Try a lightweight HEAD request to check if server is reachable
    var controller = (typeof AbortController !== 'undefined') ? new AbortController() : null;
    var timeout = setTimeout(function() {
      if (controller) controller.abort();
      onFail();
    }, 5000);

    fetch(SERVER_URL + '/login', {
      method: 'HEAD',
      mode: 'no-cors',
      cache: 'no-store',
      signal: controller ? controller.signal : undefined
    }).then(function() {
      clearTimeout(timeout);
      // Server is reachable — navigate
      window.location.href = SERVER_URL;
    }).catch(function() {
      clearTimeout(timeout);
      onFail();
    });
  }

  function onFail() {
    var dot = document.getElementById('statusDot');
    var text = document.getElementById('statusText');
    var btn = document.getElementById('retryBtn');
    dot.className = 'status-dot';
    text.textContent = 'No internet connection';
    btn.classList.remove('loading');
    btn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg> Retry Now';

    // Increase delay with backoff (3 → 5 → 10 → 15 → 30 cap)
    retryDelay = Math.min(retryDelay + Math.max(2, Math.floor(retryDelay * 0.5)), maxRetryDelay);
    startAutoRetry();
  }

  // Begin auto-retry on page load
  startAutoRetry();
</script>
</body>
</html>
