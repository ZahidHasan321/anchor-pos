services:
  pos_db:
    image: postgres:17-alpine
    container_name: pos_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-clothing_pos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pos_user} -d ${POSTGRES_DB:-clothing_pos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pos_app:
    build: .
    container_name: pos_app
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ORIGIN: https://anchorshop.cloud
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      POWERSYNC_PRIVATE_KEY: ${POWERSYNC_PRIVATE_KEY}
      POWERSYNC_PUBLIC_KEY: ${POWERSYNC_PUBLIC_KEY}
    depends_on:
      pos_db:
        condition: service_healthy

  pos_powersync:
    image: journeyapps/powersync-service:latest
    container_name: pos_powersync
    restart: always
    environment:
      POWERSYNC_DATABASE_URL: postgres://${POSTGRES_USER:-pos_user}:${POSTGRES_PASSWORD}@pos_db:5432/${POSTGRES_DB:-clothing_pos}
      POWERSYNC_JWKS_URL: https://anchorshop.cloud/.well-known/jwks.json
    ports:
      - "8080:8080"
    volumes:
      - ./powersync.yaml:/etc/powersync/powersync.yaml
      - ./powersync-rules.yaml:/etc/powersync/powersync-rules.yaml
    depends_on:
      pos_db:
        condition: service_healthy

  pos_nginx:
    image: nginx:alpine
    container_name: pos_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./ssl/cloudflare:/etc/nginx/ssl
      - ./downloads:/var/www/downloads
    depends_on:
      - pos_app
      - pos_powersync

volumes:
  postgres_data:
