services:
  pos_db:
    image: postgres:17-alpine
    container_name: pos_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-clothing_pos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres.conf:/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"
    command: postgres -c config_file=/etc/postgresql/postgresql.conf -c listen_addresses='*'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pos_user} -d ${POSTGRES_DB:-clothing_pos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  db_init:
    image: postgres:17-alpine
    container_name: db_init
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command: >
      sh -c "
        until psql -h pos_db -U ${POSTGRES_USER:-pos_user} -d postgres -c 'SELECT 1' > /dev/null 2>&1; do
          echo 'Waiting for postgres...'; sleep 2;
        done;

        psql -h pos_db -U ${POSTGRES_USER:-pos_user} -d postgres -tc \
          \"SELECT 1 FROM pg_database WHERE datname = 'powersync_storage'\" | grep -q 1 || \
          psql -h pos_db -U ${POSTGRES_USER:-pos_user} -d postgres \
          -c \"CREATE DATABASE powersync_storage;\";

        psql -h pos_db -U ${POSTGRES_USER:-pos_user} -d ${POSTGRES_DB:-clothing_pos} -tc \
          \"SELECT 1 FROM pg_publication WHERE pubname = 'powersync'\" | grep -q 1 || \
          psql -h pos_db -U ${POSTGRES_USER:-pos_user} -d ${POSTGRES_DB:-clothing_pos} \
          -c \"CREATE PUBLICATION powersync FOR ALL TABLES;\";

        psql -h pos_db -U ${POSTGRES_USER:-pos_user} -d ${POSTGRES_DB:-clothing_pos} \
          -c \"ALTER USER ${POSTGRES_USER:-pos_user} WITH REPLICATION;\";

        psql -h pos_db -U ${POSTGRES_USER:-pos_user} -d powersync_storage \
          -c \"GRANT ALL PRIVILEGES ON SCHEMA public TO ${POSTGRES_USER:-pos_user};\";

        echo 'db_init complete';
      "
    depends_on:
      pos_db:
        condition: service_healthy

  pos_app:
    build: .
    container_name: pos_app
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ORIGIN: https://anchorshop.cloud
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      POWERSYNC_PRIVATE_KEY: ${POWERSYNC_PRIVATE_KEY}
      POWERSYNC_PUBLIC_KEY: ${POWERSYNC_PUBLIC_KEY}
    healthcheck:
      test: ["CMD-SHELL", "node -e 'fetch(\"http://localhost:3000/\").then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))'"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      pos_db:
        condition: service_healthy

  pos_powersync:
    image: journeyapps/powersync-service:latest
    container_name: pos_powersync
    restart: always
    environment:
      PS_REPLICATION_URL: postgresql://${POSTGRES_USER:-pos_user}:${POSTGRES_PASSWORD}@pos_db:5432/${POSTGRES_DB:-clothing_pos}
      PS_STORAGE_URL: postgresql://${POSTGRES_USER:-pos_user}:${POSTGRES_PASSWORD}@pos_db:5432/powersync_storage
      PS_JWKS_URL: http://pos_app:3000/.well-known/jwks.json
      PS_CONFIG_PATH: /app/powersync.yaml
    ports:
      - "8080:8080"
    volumes:
      - ./powersync.yaml:/app/powersync.yaml
      - ./powersync-rules.yaml:/app/powersync-rules.yaml
    depends_on:
      pos_db:
        condition: service_healthy
      pos_app:
        condition: service_healthy
      db_init:
        condition: service_completed_successfully

  pos_nginx:
    image: nginx:alpine
    container_name: pos_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./ssl/cloudflare:/etc/nginx/ssl
      - ./downloads:/var/www/downloads
    depends_on:
      - pos_app
      - pos_powersync

volumes:
  postgres_data:
