bucket_definitions:
  # Global bucket for everyone (products, categories, etc.)
  global:
    data:
      - SELECT id, name, description, category, image_url, created_at, updated_at FROM products
      - SELECT id, product_id, sku, size, color, price, cost_price, stock_quantity, created_at, updated_at FROM product_variants
      - SELECT key, value, updated_at FROM store_settings
      - SELECT id, role, permission, created_at FROM role_permissions
      - SELECT id, username, role, is_active, created_at FROM users
  
  # Shop-specific data (Orders, Customers, Cashbook)
  # For now, we sync all since it's a single shop POS
  shop_data:
    data:
      - SELECT id, name, email, phone, address, total_spent, last_visit, created_at, updated_at FROM customers
      - SELECT id, order_number, customer_id, user_id, status, subtotal, discount_amount, tax_amount, total_amount, payment_method, payment_status, created_at, updated_at FROM orders
      - SELECT id, order_id, product_id, variant_id, quantity, unit_price, total_price, created_at FROM order_items
      - SELECT id, variant_id, change_amount, previous_stock, new_stock, reason, user_id, created_at FROM stock_logs
      - SELECT id, type, amount, category, description, user_id, reference_id, created_at, updated_at FROM cashbook
