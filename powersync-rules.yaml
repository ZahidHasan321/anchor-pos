bucket_definitions:
  global:
    data:
      - SELECT id, name, description, category, base_price, cost_price, default_discount, image_url
          FROM products

      - SELECT id, product_id, size, color, barcode, stock_quantity, price, discount
          FROM product_variants

      # store_settings has `key` as PK, not `id` — expose key as id for PowerSync
      - SELECT key AS id, key, value FROM store_settings

      # role_permissions has composite PK (role + resource) — generate stable synthetic id
      - SELECT (role || '_' || resource) AS id, role, resource FROM role_permissions

      # users — NEVER include password_hash
      - SELECT id, username, role, name, phone, email, image_url, is_active, theme
          FROM users

  shop_data:
    data:
      - SELECT id, name, phone, email, notes FROM customers

      - SELECT id, order_number, customer_id, user_id, total_amount, status,
            payment_method, discount_amount, cash_received, change_given,
            created_at::text AS created_at FROM orders

      - SELECT id, order_id, variant_id, quantity, price_at_sale, cost_at_sale, discount,
            product_name, variant_label, status FROM order_items

      - SELECT id, variant_id, change_amount, reason, user_id,
            created_at::text AS created_at FROM stock_logs

      - SELECT id, amount, type, description, user_id,
            created_at::text AS created_at FROM cashbook
