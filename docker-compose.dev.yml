# Local development stack: Postgres + PowerSync
# Usage: docker compose -f docker-compose.dev.yml up -d
# The SvelteKit app runs locally via `pnpm dev` (not containerized)

services:
  dev_db:
    image: postgres:17-alpine
    container_name: dev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: pos
      POSTGRES_DB: clothing_pos
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=5
        -c max_wal_senders=5
        -c listen_addresses='*'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos -d clothing_pos"]
      interval: 3s
      timeout: 3s
      retries: 10

  dev_db_init:
    image: postgres:17-alpine
    container_name: dev_db_init
    environment:
      PGPASSWORD: pos
    command: >
      sh -c "
        until psql -h dev_db -U pos -d postgres -c 'SELECT 1' > /dev/null 2>&1; do
          echo 'Waiting for postgres...'; sleep 1;
        done;

        psql -h dev_db -U pos -d postgres -tc \
          \"SELECT 1 FROM pg_database WHERE datname = 'powersync_storage'\" | grep -q 1 || \
          psql -h dev_db -U pos -d postgres \
          -c \"CREATE DATABASE powersync_storage;\";

        psql -h dev_db -U pos -d clothing_pos -tc \
          \"SELECT 1 FROM pg_publication WHERE pubname = 'powersync'\" | grep -q 1 || \
          psql -h dev_db -U pos -d clothing_pos \
          -c \"CREATE PUBLICATION powersync FOR ALL TABLES;\";

        psql -h dev_db -U pos -d postgres \
          -c \"ALTER USER pos WITH REPLICATION;\";

        psql -h dev_db -U pos -d powersync_storage \
          -c \"GRANT ALL PRIVILEGES ON SCHEMA public TO pos;\";

        echo 'dev_db_init complete';
      "
    depends_on:
      dev_db:
        condition: service_healthy

  dev_powersync:
    image: journeyapps/powersync-service:latest
    container_name: dev_powersync
    restart: unless-stopped
    environment:
      PS_REPLICATION_URL: postgresql://pos:pos@dev_db:5432/clothing_pos
      PS_STORAGE_URL: postgresql://pos:pos@dev_db:5432/powersync_storage
      # Points to SvelteKit dev server on host machine
      PS_JWKS_URL: http://host.docker.internal:5173/.well-known/jwks.json
      PS_CONFIG_PATH: /app/powersync.yaml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./powersync.yaml:/app/powersync.yaml
      - ./powersync-rules.yaml:/app/powersync-rules.yaml
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      dev_db:
        condition: service_healthy
      dev_db_init:
        # Wait for db_init to finish creating powersync_storage DB + publication
        condition: service_completed_successfully
    # db_init may finish but postgres needs a moment to commit; small delay avoids race
    entrypoint: ["sh", "-c", "sleep 3 && exec node service/lib/entry.js"]

volumes:
  dev_postgres_data:
